version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ligadoai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ligadoai
      POSTGRES_USER: ligadoai
      POSTGRES_PASSWORD: ligadoai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ligadoai -d ligadoai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
