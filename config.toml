[opentracy]
backend_url = "http://localhost:8002"
runtime_url = "http://localhost:8001"
agent_id = "_default"
timeout = 120

[auth]
api_token_file = "~/.ligadoai/api_token"

[model]
provider = "deepseek"
small = "deepseek-chat"
big = "deepseek-reasoner"
temperature = 0.3
max_tokens = 2048

[memory]
max_history = 10
max_chars_before_summary = 16000
summary_max_chars = 2500
flatten_history_into_request = true

[security]
allowed_read_dirs = [
    "~/LigadoAI",
    "{paths.terminal_root}/knowledge_md",
    "{paths.terminal_root}/knowledge",
]
allowed_write_dirs = [
    "{paths.terminal_root}/reports",
]
max_file_size = 10485760
max_tool_output_bytes = 65536
block_secrets = true

[mcp]
tool_timeout_seconds = 30
max_restarts_per_server = 3
restart_backoff_seconds = 5
log_tool_errors = true

[knowledge]
source_dir = "knowledge"
output_dir = "knowledge_md"
chunk_size = 256
overlap = 64
ingest_target = "{paths.opentracy_root}/corpora/indexed"

[ui]
theme = "dark"
show_timestamp = true
show_trace_id = true
show_cost = false

[paths]
opentracy_root = "~/Projetos/ligadotattoo/OpenTracy"
terminal_root = "~/Projetos/ligadotattoo/opentracy-terminal-chat"

[banco]
# PostgreSQL connection
host = "localhost"
port = 5432
database = "ligadoai"
user = "ligadoai"
password = "ligadoai"
min_connections = 2
max_connections = 10
# pgvector: habilita busca semântica
vector_dimension = 1536
